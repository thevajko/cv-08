<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script>
        window.onload = () => {
            obsah = document.getElementById('obsah')
            // for (let i = 0; i < 5; i++) {
            //     let header = document.createElement('h1')
            //     header.innerText = "Nadpis " + (i + 1)
            //     obsah.appendChild(header)
            // }
            document.getElementById('pocitaj').addEventListener('click', function () {
                obsah.innerText = faktorial(document.getElementById('cislo').value)
            })

        }

        function faktorial(n) {
            f = 1
            for (let i = 1; i <= n; i++) {
                f *= i
            }
            return f
        }



    </script>
</head>
<body>
<input type="number" id="cislo" value="1"><button id="pocitaj">Počítaj</button>
<div id="obsah">
</div>
</body>
</html>
