<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pexeso</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <script type="module"  src="js/main.js" defer></script>
    <script>
        function generuj(idecko){
            let element = document.getElementById(idecko);

            for (let i = 0; i < 5; i++) {
                let h1 = document.createElement("h1");
                h1.innerText = "nadpis " + i;
                element.append(h1);
            }
        }

        function faktorial(cislo) {
            let final = 1;
            while (cislo >= 1) {
                final = final * cislo;
                cislo --;
            }
            return final;
        }

        window.onload = () => {
            let fakIn = document.getElementById("faktorial-cislo");
            let fakBtn = document.getElementById("faktorial-pocitaj");
            let fakVys = document.getElementById("faktorial-vysledok");
            fakBtn.onclick = () => {
                // ziskaj s inputu.value hodnotu
                let cislo = fakIn.value;
                // vyrataj faktorial
                let vysledok = faktorial(cislo);
                // vloz vysledok do elementu pre zobrazenie vysledku
                fakVys.innerHTML = vysledok;
            };
        }




    </script>
</head>
<body>
<div>
    <input type="text" id="faktorial-cislo">
    <button id="faktorial-pocitaj">pocitaj</button>
    <div id="faktorial-vysledok"></div>
</div>
<div id="score">
    <div id="player1">
        Hráč 1:
        <span id="player1_guessed">0</span>
    </div>
    <div id="player2">
        Hráč 2:
        <span id="player2_guessed">0</span>
    </div>
</div>
<div id="board"></div>
<button id="start">Rozdaj karty</button>
</body>
</html>
