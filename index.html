<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pexeso</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <script type="module"  src="js/main.js" defer></script>
    <script>
        function generuj(id){
            let element = document.getElementById(id);
            for (let i = 0; i < 5; i++) {
                let h1 = document.createElement("h1");
                h1.innerHTML = "<span>Nadpis <i></i></span>";
                let ii = h1.querySelector("i");
                ii.innerText = i;
                element.append(h1);
            }
        }

        function faktorial(cislo){
            if (cislo > 0) {
                return cislo * faktorial(cislo -1);
            }
            return 1;
        }


        window.addEventListener("load", () => generuj("score"));

    </script>
</head>
<body>
<div id="score">
    <div id="player1">
        Hráč 1:
        <span id="player1_guessed">0</span>
    </div>
    <div id="player2">
        Hráč 2:
        <span id="player2_guessed">0</span>
    </div>
</div>
<div id="board"></div>
<button id="start">Rozdaj karty</button>
</body>
</html>
